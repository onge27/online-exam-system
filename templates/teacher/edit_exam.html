{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash-msg {{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="page-content">

  <div class="card">

    <style>
      :root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222636;
  --border: #2e3248;

  --text: #e6e6e6;
  --muted: #9aa4b2;

  --primary: #4f7cff;
  --danger: #ff4d4d;
  --success: #22c55e;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

.page-content {
  padding: 24px;
  display: flex;
  justify-content: center;
}

.card {
  width: 100%;
  max-width: 900px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}

.form-group {
  margin-bottom: 14px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-size: 13px;
  color: var(--muted);
}

.form-control {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
}

textarea.form-control {
  min-height: 90px;
}

.btn {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  font-size: 14px;
}

.btn-primary {
  background: var(--primary);
  color: white;
}

.btn-ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
}

.btn-sm {
  padding: 6px 10px;
  font-size: 12px;
}

.flash-container {
  margin-bottom: 16px;
}

.flash-msg {
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
}

.flash-msg.success {
  background: rgba(34, 197, 94, 0.15);
  border: 1px solid var(--success);
}

.flash-msg.error {
  background: rgba(255, 77, 77, 0.15);
  border: 1px solid var(--danger);
}

.flex { display: flex; }
.gap-3 { gap: 12px; }
.mt-4 { margin-top: 16px; }
    </style>

    <!-- HEADER -->
    <div class="card-header">
      <h3>✏️ Edit Exam</h3>

      <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-ghost btn-sm">
        ← Back
      </a>
    </div>

    <!-- FORM -->
    <form method="POST">

      <!-- SUBJECT -->
      <div class="form-group">
        <label>Subject</label>
        <select name="subject_id" class="form-control">
          {% for c in courses %}
            <option value="{{c.id}}"
              {% if c.id == exam.subject_id %}selected{% endif %}>
              {{c.subject_name}}
            </option>
          {% endfor %}
        </select>
      </div>

      <!-- TITLE -->
      <div class="form-group">
        <label>Exam Title</label>
        <input name="title"
               value="{{exam.title}}"
               class="form-control"
               placeholder="Enter exam title">
      </div>

      <!-- TIMER -->
      <div class="form-group">
        <label>Timer (Minutes)</label>
        <input type="number"
               name="timer_minutes"
               value="{{exam.timer_minutes}}"
               class="form-control"
               placeholder="e.g. 60">
      </div>

      <!-- ACTION BUTTONS -->
      <div class="flex gap-3 mt-4">

        <button type="submit" class="btn btn-primary">
          💾 Update Exam
        </button>

        <a href="{{ url_for('teacher.dashboard') }}" class="btn btn-ghost">
          Cancel
        </a>

      </div>

    </form>

  </div>

</div>
