{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block body %}
<div class="auth-page">
  <div class="auth-card">
    <div class="logo-area">
      <div class="icon-wrap">🎓</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
        Sign In →
      </button>
    </form>

    <div class="divider"></div>
    <p class="text-center text-muted text-sm">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </p>

    <div style="margin-top:20px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-size:0.78rem; color:var(--text-muted);">
      <strong style="color:var(--text-muted);">Default Admin:</strong><br/>
      📧 admin@exam.com &nbsp;|&nbsp; 🔑 admin123
    </div>
  </div>
</div>
{% endblock %}
